server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = /course {
        return 301 /course/;
    }

    location /course/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /course/ {
        if ($http_user_agent ~* "(facebookexternalhit|facebot|whatsapp|twitterbot|linkedinbot|slackbot|discordbot|telegrambot)") {
            default_type text/html;
            return 200 '<!doctype html><html><head><meta charset="utf-8"><title></title></head><body></body></html>';
        }

        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /course/index.html;
    }

    location /health {
        proxy_pass http://backend:8000;
    }
}
